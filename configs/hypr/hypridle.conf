# ╔══════════════════════════════════════════════╗
# ║         anand-dots — Hypridle Config          ║
# ║     Idle management: lock, dpms, suspend      ║
# ╚══════════════════════════════════════════════╝

general {
    lock_cmd = pidof hyprlock || hyprlock       # Avoid starting multiple hyprlock instances
    before_sleep_cmd = loginctl lock-session    # Lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on  # Turn on display after sleep
}

# ── Dim monitor backlight after 8 min ──────────
listener {
    timeout = 480
    on-timeout = brightnessctl -s set 10       # Save & dim to minimum
    on-resume = brightnessctl -r               # Restore brightness
}

# ── Lock screen after 10 min ───────────────────
listener {
    timeout = 600
    on-timeout = loginctl lock-session
}

# ── Turn off display after 11 min ──────────────
listener {
    timeout = 660
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on && brightnessctl -r
}

# ── Suspend after 30 min ───────────────────────
listener {
    timeout = 1800
    on-timeout = systemctl suspend
}
