# ╔══════════════════════════════════════════════╗
# ║           anand-dots — Hyprland              ║
# ║        Main Configuration File               ║
# ╚══════════════════════════════════════════════╝
#
# This is the master config. All sections are split
# into modular files and sourced below.

# ── Source Modules ──────────────────────────────
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/animations.conf
source = ~/.config/hypr/keybindings.conf
source = ~/.config/hypr/rules.conf
source = ~/.config/hypr/theme.conf

# ── Environment Variables ───────────────────────
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# ── General Settings ───────────────────────────
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2

    # Border colors are set by theme.conf via variables
    col.active_border = $blue $mauve 45deg
    col.inactive_border = $surface0

    layout = dwindle

    # Allow window resizing from borders and gaps
    resize_on_border = true
}

# ── Decoration ──────────────────────────────────
decoration {
    rounding = 10

    # Opacity
    active_opacity = 0.95
    inactive_opacity = 0.85
    fullscreen_opacity = 1.0

    # Shadow
    shadow {
        enabled = true
        range = 8
        render_power = 2
        color = rgba(00000044)
    }

    # Blur
    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        ignore_opacity = true
    }
}

# ── Input ───────────────────────────────────────
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
    }
}

# ── Layout: Dwindle ────────────────────────────
dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
}

# ── Misc ────────────────────────────────────────
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

# ── Autostart ───────────────────────────────────
# Status bar
exec-once = waybar

# Notification daemon
exec-once = mako

# Wallpaper engine
exec-once = swww-daemon

# Clipboard history listener
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Authentication agent
exec-once = /usr/lib/polkit-kde-authentication-agent-1
