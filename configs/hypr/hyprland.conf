# ╔══════════════════════════════════════════════╗
# ║           anand-dots — Hyprland              ║
# ║        Main Configuration File               ║
# ╚══════════════════════════════════════════════╝
#
# This is the master config. All sections are split
# into modular files and sourced below.

# ── Source Modules ──────────────────────────────
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/animations.conf
source = ~/.config/hypr/keybindings.conf
source = ~/.config/hypr/rules.conf
source = ~/.config/hypr/theme.conf

# ── Environment Variables ───────────────────────
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# QT
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1

# GDK / GTK
env = GDK_BACKEND,wayland,x11,*
env = GDK_SCALE,1

# Toolkit backend
env = CLUTTER_BACKEND,wayland

# Mozilla
env = MOZ_ENABLE_WAYLAND,1

# Electron / Ozone
env = OZONE_PLATFORM,wayland
env = ELECTRON_OZONE_PLATFORM_HINT,wayland

# SDL
env = SDL_VIDEODRIVER,wayland

# XWayland
xwayland {
    force_zero_scaling = true
}

# ── General Settings ───────────────────────────
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2

    # Border colors are set by theme.conf via variables
    col.active_border = $blue $mauve 45deg
    col.inactive_border = $surface0

    layout = dwindle

    # Allow window resizing from borders and gaps
    resize_on_border = true
}

# ── Decoration ──────────────────────────────────
decoration {
    rounding = 10

    # Opacity
    active_opacity = 0.95
    inactive_opacity = 0.85
    fullscreen_opacity = 1.0

    # Shadow
    shadow {
        enabled = true
        range = 32
        render_power = 2
        color = rgba(00000050)
    }

    # Blur
    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        vibrancy = 1.00
        vibrancy_darkness = 0.5
        ignore_opacity = true
        xray = false
        popups = true
    }
}

# ── Input ───────────────────────────────────────
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0.0

    touchpad {
        natural_scroll = true
    }
}

# ── Layout: Dwindle ────────────────────────────
dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
}

# ── Binds ───────────────────────────────────────
binds {
    workspace_back_and_forth = false
    allow_workspace_cycles = true
    pass_mouse_when_bound = false
}

# ── Misc ────────────────────────────────────────
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    initial_workspace_tracking = 1
    allow_session_lock_restore = true
}

# ── Tearing ─────────────────────────────────────
# Allow screen tearing in fullscreen (matches KDE setting)
general {
    allow_tearing = true
}

# Tearing window rule — only tear in fullscreen apps
windowrule = immediate 1, match:fullscreen ^(1)$

# ── Autostart ───────────────────────────────────
# Status bar
exec-once = waybar

# Notification daemon
exec-once = mako

# Wallpaper engine
exec-once = bash -lc 'if command -v swww-daemon >/dev/null; then swww-daemon; elif command -v awww-daemon >/dev/null; then awww-daemon; else notify-send "Wallpaper" "Install swww or awww"; fi'
exec-once = sleep 1 && ~/.config/hypr/scripts/wallpaper-restore.sh

# Clipboard history listener
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Network manager applet (tray icon)
exec-once = nm-applet --indicator

# Bluetooth applet (tray icon)
exec-once = blueman-applet

# Authentication agent
exec-once = /usr/lib/polkit-kde-authentication-agent-1

# Idle management (auto-lock, dpms, suspend)
exec-once = hypridle

# Portal environment (needed for screen sharing, etc.)
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Cursor theme
exec-once = hyprctl setcursor Bibata-Modern-Ice 24

# ── Layer Rules (blur for overlays) ─────────────
layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0, match:namespace waybar
layerrule = blur on, match:namespace notifications
layerrule = ignore_alpha 0, match:namespace notifications
layerrule = blur on, match:namespace wlogout
layerrule = ignore_alpha 0, match:namespace wlogout