# ── Animations ──────────────────────────────────
animations {
    enabled = true

    # Bezier curves
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    bezier = easeOut, 0.16, 1, 0.3, 1
    bezier = easeIn, 0.4, 0, 0.2, 1

    # Window animations
    animation = windows, 1, 5, myBezier
    animation = windowsIn, 1, 4, easeOut, slide
    animation = windowsOut, 1, 4, easeIn, slide
    animation = windowsMove, 1, 4, easeOut

    # Fade
    animation = fade, 1, 4, easeOut

    # Border
    animation = border, 1, 8, easeOut
    animation = borderangle, 1, 6, easeOut

    # Workspaces
    animation = workspaces, 1, 4, easeOut, slide
}
