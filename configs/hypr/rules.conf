# ── Layer Rules (blur transparent surfaces) ────
layerrule = blur off, match:namespace waybar
layerrule = blur off, match:namespace rofi
layerrule = blur on, match:namespace notifications

# ── Window Rules ────────────────────────────────
# Float specific windows
windowrule = float on, match:class ^([Pp]avucontrol|pwvucontrol|[Pp]avucontrol-qt)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(nm-connection-editor)$
windowrule = float on, match:class ^(org.kde.polkit-kde-authentication-agent-1)$
windowrule = float on, match:title ^(Open File)$
windowrule = float on, match:title ^(Save File)$
windowrule = float on, match:title ^(File Upload)$
windowrule = float on, match:class ^(org.gnome.Calculator)$
windowrule = float on, match:class ^(nwg-look)$
windowrule = float on, match:class ^(nwg-displays)$

# ── Rofi launcher ──────────────────────────────
windowrule = float on, match:class ^(Rofi)$
windowrule = center 1, match:class ^(Rofi)$
windowrule = pin on, match:class ^(Rofi)$

# Set size for floating dialogs
windowrule = size 600 400, match:title ^(Open File)$
windowrule = size 600 400, match:title ^(Save File)$

# ── Picture-in-Picture ─────────────────────────
windowrule = float on, match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
windowrule = pin on, match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
windowrule = center 1, match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$

# ── Volume Mixers ──────────────────────────────
windowrule = center 1, match:class ^([Pp]avucontrol|pwvucontrol|[Pp]avucontrol-qt)$
windowrule = size 700 600, match:class ^([Pp]avucontrol|pwvucontrol|[Pp]avucontrol-qt)$
windowrule = pin on, match:class ^([Pp]avucontrol|pwvucontrol|[Pp]avucontrol-qt)$

# ── Blueman Manager ────────────────────────────
windowrule = center 1, match:class ^(blueman-manager)$
windowrule = size 800 600, match:class ^(blueman-manager)$

# ── Network Manager ────────────────────────────
windowrule = center 1, match:class ^(nm-connection-editor)$
windowrule = size 800 700, match:class ^(nm-connection-editor)$

# ── Hyprland Share Picker ──────────────────────
windowrule = float on, match:class ^(hyprland-share-picker)$
windowrule = pin on, match:class ^(hyprland-share-picker)$
windowrule = center 1, match:class ^(hyprland-share-picker)$
windowrule = size 600 400, match:class ^(hyprland-share-picker)$

# ── Workspace Assignments (uncomment as needed) ─
# windowrule = workspace 2, match:class ^(firefox)$
# windowrule = workspace 3, match:class ^(org.gnome.Nautilus)$
# windowrule = workspace 4, match:class ^(Spotify)$
# windowrule = workspace 5, match:class ^(code-oss)$

# ── Opacity Overrides ──────────────────────────
# windowrule = opacity 1.0 override, match:class ^(firefox)$
# windowrule = opacity 1.0 override, match:class ^(mpv)$

# ── Nautilus (blurred file manager) ────────────
windowrule = opacity 0.95 override 0.95 override, match:class ^(org.gnome.Nautilus)$

# ── Waypaper (wallpaper manager) ───────────────
windowrule = float on, match:class ^(waypaper)$
windowrule = size 900 600, match:class ^(waypaper)$
windowrule = center on, match:class ^(waypaper)$

# ── anand-dots Settings ───────────────────────
windowrule = float on, match:class ^(dev.anand.dots.settings)$
windowrule = size 1050 720, match:class ^(dev.anand.dots.settings)$
windowrule = center on, match:class ^(dev.anand.dots.settings)$
