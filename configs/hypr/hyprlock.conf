# ╔══════════════════════════════════════════════╗
# ║         anand-dots — Hyprlock Config          ║
# ║  Lock screen with blurred wallpaper backdrop  ║
# ╚══════════════════════════════════════════════╝

source = ~/.config/hypr/theme.conf

general {
    ignore_empty_input = true
}

# ── Background ──────────────────────────────────
background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 6
    contrast = 0.9
    brightness = 0.7
    vibrancy = 0.17
}

# ── Password Input ──────────────────────────────
input-field {
    monitor =
    size = 250, 50
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1
    inner_color = rgba(1e1e2ecc)
    font_color = rgb(cdd6f4)
    font_family = JetBrainsMono Nerd Font
    outer_color = rgb(89b4fa)
    outline_thickness = 2
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <i>Password...</i>
    hide_input = false
    rounding = 10
    check_color = rgb(a6e3a1)
    fail_color = rgb(f38ba8)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = rgb(f9e2af)
    position = 0, -20
    halign = center
    valign = center
    shadow_passes = 5
    shadow_size = 10
}

# ── Clock ───────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(date +%H:%M)"
    color = rgb(cdd6f4)
    font_size = 80
    font_family = JetBrainsMono Nerd Font
    position = 0, 200
    halign = center
    valign = center
    shadow_passes = 5
    shadow_size = 10
}

# ── Date ────────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] echo "$(date '+%A, %B %d')"
    color = rgb(bac2de)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 120
    halign = center
    valign = center
    shadow_passes = 5
    shadow_size = 10
}

# ── Username ────────────────────────────────────
label {
    monitor =
    text = $USER
    color = rgb(89b4fa)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, 50
    halign = center
    valign = center
    shadow_passes = 5
    shadow_size = 10
}
