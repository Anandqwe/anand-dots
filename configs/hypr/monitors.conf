# ── Monitor Configuration ───────────────────────
# Format: monitor = name, resolution@rate, position, scale
#
# Matched from KDE Display Configuration:
#   Resolution:   1920x1080 (16:9)
#   Refresh rate: 60Hz
#   Scale:        125% → 1.25
#   Orientation:  Normal
#
# Use `hyprctl monitors` to list connected monitors.

monitor = , 1920x1080@60, auto, 1.25

# ── Multi-Monitor Examples (uncomment as needed) ─
# monitor = DP-1, 1920x1080@144, 0x0, 1.25
# monitor = HDMI-A-1, 1920x1080@60, 1920x0, 1.25
