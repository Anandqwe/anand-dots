# ── Keybindings ─────────────────────────────────
# Mod key
$mod = SUPER
$SCRIPTS = ~/.config/hypr/scripts

# ── Application Launchers ──────────────────────
bind = $mod, Return, exec, kitty
bind = $mod, D, exec, ~/.config/hypr/scripts/rofi-launcher.sh drun
bind = $mod SHIFT, D, exec, ~/.config/hypr/scripts/rofi-launcher.sh window  # Window switcher
bind = $mod, B, exec, firefox                                   # Browser
bind = $mod, E, exec, nautilus                                   # File manager
bind = $mod, X, exec, ~/.config/hypr/scripts/powermenu.sh
bind = $mod SHIFT, V, exec, ~/.config/hypr/scripts/clipboard.sh

# ── Window Management ──────────────────────────
bind = $mod, Q, killactive
bind = $mod, F, fullscreen, 0                                   # Fullscreen
bind = $mod, M, fullscreen, 1                                   # Maximize
bind = $mod, V, togglefloating
bind = $mod, P, pseudo
bind = $mod, J, layoutmsg, togglesplit
bind = $mod, G, togglegroup                                     # Window groups

# ── Focus Movement (vim-style + arrows) ────────
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod SHIFT, J, movefocus, d
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# ── Window Movement ────────────────────────────
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod CTRL, J, movewindow, d

# ── Swap Windows ───────────────────────────────
bind = $mod ALT, left, swapwindow, l
bind = $mod ALT, right, swapwindow, r
bind = $mod ALT, up, swapwindow, u
bind = $mod ALT, down, swapwindow, d
bind = $mod ALT, K, layoutmsg, swapsplit

# ── Window Resize (keyboard) ──────────────────
binde = $mod SHIFT, right, resizeactive, 100 0
binde = $mod SHIFT, left, resizeactive, -100 0
binde = $mod SHIFT, down, resizeactive, 0 100
binde = $mod SHIFT, up, resizeactive, 0 -100

# ── Alt+Tab Window Cycling ─────────────────────
binde = ALT, Tab, cyclenext
binde = ALT, Tab, bringactivetotop

# ── Workspace Switching ────────────────────────
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10
bind = $mod, Tab, workspace, m+1                                # Next workspace
bind = $mod SHIFT, Tab, workspace, m-1                          # Previous workspace
bind = $mod CTRL, down, workspace, empty                        # Open empty workspace

# ── Move Window to Workspace ───────────────────
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# ── Mouse Bindings ─────────────────────────────
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
bind = $mod, mouse_down, workspace, e+1                         # Scroll workspaces
bind = $mod, mouse_up, workspace, e-1

# ── Display Zoom ───────────────────────────────
bind = $mod SHIFT, mouse_down, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') + 0.5}")
bind = $mod SHIFT, mouse_up, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') - 0.5}")
bind = $mod SHIFT, Z, exec, hyprctl keyword cursor:zoom_factor 1

# ── Wallpaper ──────────────────────────────────
bind = $mod CTRL, W, exec, waypaper                             # Open wallpaper manager
bind = $mod SHIFT, W, exec, ~/.config/hypr/scripts/wallpaper.sh # Random wallpaper

# ── Screenshots ────────────────────────────────
bind = $mod SHIFT, S, exec, ~/.config/hypr/scripts/screenshot.sh area
bind = , Print, exec, ~/.config/hypr/scripts/screenshot.sh full
bind = $mod, Print, exec, ~/.config/hypr/scripts/screenshot.sh window

# ── Actions ────────────────────────────────────
bind = $mod CTRL, R, exec, hyprctl reload                       # Reload Hyprland
bind = $mod CTRL, S, exec, $SCRIPTS/settings.sh                 # Settings GUI
bind = $mod SHIFT, A, exec, $SCRIPTS/toggle-animations.sh       # Toggle animations
bind = $mod ALT, G, exec, $SCRIPTS/gamemode.sh                  # Toggle game mode
bind = $mod CTRL, K, exec, $SCRIPTS/keybindings.sh              # Show keybindings
bind = $mod CTRL, B, exec, $SCRIPTS/toggle-waybar.sh            # Toggle waybar
bind = $mod SHIFT, B, exec, $SCRIPTS/reload.sh                  # Reload waybar
bind = CTRL, Tab, exec, $SCRIPTS/focus.sh                       # Window switcher

# ── Session ────────────────────────────────────
bind = $mod CTRL, Q, exec, ~/.config/hypr/scripts/powermenu.sh  # Power menu
bind = $mod CTRL, L, exec, hyprlock                             # Lock screen

# ── Media Keys ─────────────────────────────────
binde = , XF86AudioRaiseVolume, exec, pamixer -i 5
binde = , XF86AudioLowerVolume, exec, pamixer -d 5
bind  = , XF86AudioMute, exec, pamixer -t
bind  = , XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle
bind  = , XF86AudioPlay, exec, playerctl play-pause
bind  = , XF86AudioPause, exec, playerctl pause
bind  = , XF86AudioNext, exec, playerctl next
bind  = , XF86AudioPrev, exec, playerctl previous

# ── Brightness Keys ────────────────────────────
binde = , XF86MonBrightnessUp, exec, brightnessctl set +10%
binde = , XF86MonBrightnessDown, exec, brightnessctl set 10%-
