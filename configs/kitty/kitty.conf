# ╔══════════════════════════════════════════════╗
# ║         anand-dots — Kitty Config             ║
# ║         Theme: material-you                 ║
# ╚══════════════════════════════════════════════╝

# ── Shell ───────────────────────────────────────
shell /usr/bin/zsh

# ── Font ────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# ── Window ──────────────────────────────────────
window_padding_width 12
background_opacity   0.5
confirm_os_window_close 0

# ── Cursor ──────────────────────────────────────
cursor_shape beam
cursor_blink_interval 0.5

# ── Scrollback ──────────────────────────────────
scrollback_lines 10000

# ── Bell ────────────────────────────────────────
enable_audio_bell no

# ── Tab Bar ─────────────────────────────────────
tab_bar_style    powerline
tab_powerline_style slanted

# ── URL Handling ────────────────────────────────
url_style curly
detect_urls yes

# ── Color Scheme: material-you ─────────────────

# Special
foreground           #e5e7ec
background           #101417
selection_foreground  #101417
selection_background  #b8d9fa
cursor               #b8d9fa
cursor_text_color    #101417
url_color            #97cbff

# Black
color0  #202327
color8  #2a2e32

# Red
color1  #ffb4ab
color9  #ffb4ab

# Green
color2  #a7ccf0
color10 #a7ccf0

# Yellow
color3  #b8d9fa
color11 #b8d9fa

# Blue
color4  #97cbff
color12 #97cbff

# Magenta
color5  #e8ccac
color13 #e8ccac

# Cyan
color6  #fcbb54
color14 #fcbb54

# White
color7  #c0c7d1
color15 #9097a0

# Tab bar colors
active_tab_foreground   #090c10
active_tab_background   #e1b167
inactive_tab_foreground #e5e7ec
inactive_tab_background #101417
tab_bar_background      #090c10
