# ╔══════════════════════════════════════════════╗
# ║         anand-dots — Kitty Config             ║
# ║         Theme: dracula                 ║
# ╚══════════════════════════════════════════════╝

# ── Shell ───────────────────────────────────────
shell /usr/bin/zsh

# ── Font ────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# ── Window ──────────────────────────────────────
window_padding_width 12
background_opacity   0.5
confirm_os_window_close 0

# ── Cursor ──────────────────────────────────────
cursor_shape beam
cursor_blink_interval 0.5

# ── Scrollback ──────────────────────────────────
scrollback_lines 10000

# ── Bell ────────────────────────────────────────
enable_audio_bell no

# ── Tab Bar ─────────────────────────────────────
tab_bar_style    powerline
tab_powerline_style slanted

# ── URL Handling ────────────────────────────────
url_style curly
detect_urls yes

# ── Color Scheme: dracula ─────────────────

# Special
foreground           #f8f8f2
background           #282a36
selection_foreground  #282a36
selection_background  #f8f8f2
cursor               #f8f8f2
cursor_text_color    #282a36
url_color            #bd93f9

# Black
color0  #383a4a
color8  #44475a

# Red
color1  #ff5555
color9  #ff5555

# Green
color2  #50fa7b
color10 #50fa7b

# Yellow
color3  #f1fa8c
color11 #f1fa8c

# Blue
color4  #bd93f9
color12 #bd93f9

# Magenta
color5  #ff79c6
color13 #ff79c6

# Cyan
color6  #8be9fd
color14 #8be9fd

# White
color7  #e0e0e0
color15 #bfbfbf

# Tab bar colors
active_tab_foreground   #191a21
active_tab_background   #bd93f9
inactive_tab_foreground #f8f8f2
inactive_tab_background #21222c
tab_bar_background      #191a21
