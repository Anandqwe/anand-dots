# ╔══════════════════════════════════════════════╗
# ║         anand-dots — Kitty Config             ║
# ║         Theme: material-you                 ║
# ╚══════════════════════════════════════════════╝

# ── Shell ───────────────────────────────────────
shell /usr/bin/zsh

# ── Font ────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# ── Window ──────────────────────────────────────
window_padding_width 12
background_opacity   0.5
confirm_os_window_close 0

# ── Cursor ──────────────────────────────────────
cursor_shape beam
cursor_blink_interval 0.5

# ── Scrollback ──────────────────────────────────
scrollback_lines 10000

# ── Bell ────────────────────────────────────────
enable_audio_bell no

# ── Tab Bar ─────────────────────────────────────
tab_bar_style    powerline
tab_powerline_style slanted

# ── URL Handling ────────────────────────────────
url_style curly
detect_urls yes

# ── Color Scheme: material-you ─────────────────

# Special
foreground           #f3e3e2
background           #191211
selection_foreground  #191211
selection_background  #e1afab
cursor               #e1afab
cursor_text_color    #191211
url_color            #ffb3ad

# Black
color0  #292120
color8  #342b2b

# Red
color1  #ffb4ab
color9  #ffb4ab

# Green
color2  #e6b0ab
color10 #e6b0ab

# Yellow
color3  #e1afab
color11 #e1afab

# Blue
color4  #ffb3ad
color12 #ffb3ad

# Magenta
color5  #aec1d3
color13 #aec1d3

# Cyan
color6  #a0cee6
color14 #a0cee6

# White
color7  #d9c1bf
color15 #a7918f

# Tab bar colors
active_tab_foreground   #110a09
active_tab_background   #92acc1
inactive_tab_foreground #f3e3e2
inactive_tab_background #191211
tab_bar_background      #110a09
