# ╔══════════════════════════════════════════════╗
# ║         anand-dots — Kitty Config             ║
# ║         Theme: nord                 ║
# ╚══════════════════════════════════════════════╝

# ── Shell ───────────────────────────────────────
shell /usr/bin/zsh

# ── Font ────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# ── Window ──────────────────────────────────────
window_padding_width 12
background_opacity   0.5
confirm_os_window_close 0

# ── Cursor ──────────────────────────────────────
cursor_shape beam
cursor_blink_interval 0.5

# ── Scrollback ──────────────────────────────────
scrollback_lines 10000

# ── Bell ────────────────────────────────────────
enable_audio_bell no

# ── Tab Bar ─────────────────────────────────────
tab_bar_style    powerline
tab_powerline_style slanted

# ── URL Handling ────────────────────────────────
url_style curly
detect_urls yes

# ── Color Scheme: nord ─────────────────

# Special
foreground           #eceff4
background           #2e3440
selection_foreground  #2e3440
selection_background  #d8dee9
cursor               #d8dee9
cursor_text_color    #2e3440
url_color            #81a1c1

# Black
color0  #434c5e
color8  #4c566a

# Red
color1  #bf616a
color9  #bf616a

# Green
color2  #a3be8c
color10 #a3be8c

# Yellow
color3  #ebcb8b
color11 #ebcb8b

# Blue
color4  #81a1c1
color12 #81a1c1

# Magenta
color5  #b48ead
color13 #b48ead

# Cyan
color6  #8fbcbb
color14 #8fbcbb

# White
color7  #e5e9f0
color15 #d8dee9

# Tab bar colors
active_tab_foreground   #242933
active_tab_background   #b48ead
inactive_tab_foreground #eceff4
inactive_tab_background #292e39
tab_bar_background      #242933
