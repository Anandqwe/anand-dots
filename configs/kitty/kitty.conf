# ╔══════════════════════════════════════════════╗
# ║         anand-dots — Kitty Config             ║
# ║         Theme: material-you                 ║
# ╚══════════════════════════════════════════════╝

# ── Shell ───────────────────────────────────────
shell /usr/bin/zsh

# ── Font ────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# ── Window ──────────────────────────────────────
window_padding_width 12
background_opacity   0.5
confirm_os_window_close 0

# ── Cursor ──────────────────────────────────────
cursor_shape beam
cursor_blink_interval 0.5

# ── Scrollback ──────────────────────────────────
scrollback_lines 10000

# ── Bell ────────────────────────────────────────
enable_audio_bell no

# ── Tab Bar ─────────────────────────────────────
tab_bar_style    powerline
tab_powerline_style slanted

# ── URL Handling ────────────────────────────────
url_style curly
detect_urls yes

# ── Color Scheme: material-you ─────────────────

# Special
foreground           #eee3f2
background           #16111b
selection_foreground  #16111b
selection_background  #c8b2da
cursor               #c8b2da
cursor_text_color    #16111b
url_color            #ddb8ff

# Black
color0  #26212b
color8  #312b36

# Red
color1  #ffb4ab
color9  #ffb4ab

# Green
color2  #d3b0dd
color10 #d3b0dd

# Yellow
color3  #c8b2da
color11 #c8b2da

# Blue
color4  #ddb8ff
color12 #ddb8ff

# Magenta
color5  #d9afd3
color13 #d9afd3

# Cyan
color6  #edb5e2
color14 #edb5e2

# White
color7  #cdc3d1
color15 #9c93a0

# Tab bar colors
active_tab_foreground   #0f0a13
active_tab_background   #cc92c5
inactive_tab_foreground #eee3f2
inactive_tab_background #16111b
tab_bar_background      #0f0a13
