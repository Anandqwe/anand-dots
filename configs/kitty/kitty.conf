# ╔══════════════════════════════════════════════╗
# ║         anand-dots — Kitty Config             ║
# ║         Theme: material-you                 ║
# ╚══════════════════════════════════════════════╝

# ── Shell ───────────────────────────────────────
shell /usr/bin/zsh

# ── Font ────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# ── Window ──────────────────────────────────────
window_padding_width 12
background_opacity   0.5
confirm_os_window_close 0

# ── Cursor ──────────────────────────────────────
cursor_shape beam
cursor_blink_interval 0.5

# ── Scrollback ──────────────────────────────────
scrollback_lines 10000

# ── Bell ────────────────────────────────────────
enable_audio_bell no

# ── Tab Bar ─────────────────────────────────────
tab_bar_style    powerline
tab_powerline_style slanted

# ── URL Handling ────────────────────────────────
url_style curly
detect_urls yes

# ── Color Scheme: material-you ─────────────────

# Special
foreground           #e2e7f3
background           #0e141c
selection_foreground  #0e141c
selection_background  #a7bfe0
cursor               #a7bfe0
cursor_text_color    #0e141c
url_color            #a0c9ff

# Black
color0  #1d232c
color8  #282e36

# Red
color1  #ffb4ab
color9  #ffb4ab

# Green
color2  #c5d6f1
color10 #c5d6f1

# Yellow
color3  #a7bfe0
color11 #a7bfe0

# Blue
color4  #a0c9ff
color12 #a0c9ff

# Magenta
color5  #c4cff3
color13 #c4cff3

# Cyan
color6  #c2c2f9
color14 #c2c2f9

# White
color7  #c1c7d2
color15 #9197a1

# Tab bar colors
active_tab_foreground   #060c14
active_tab_background   #a9b6f0
inactive_tab_foreground #e2e7f3
inactive_tab_background #0e141c
tab_bar_background      #060c14
