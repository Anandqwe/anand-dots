# ╔══════════════════════════════════════════════╗
# ║         anand-dots — Kitty Config             ║
# ║         Theme: material-you                 ║
# ╚══════════════════════════════════════════════╝

# ── Shell ───────────────────────────────────────
shell /usr/bin/zsh

# ── Font ────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# ── Window ──────────────────────────────────────
window_padding_width 12
background_opacity   0.5
confirm_os_window_close 0

# ── Cursor ──────────────────────────────────────
cursor_shape beam
cursor_blink_interval 0.5

# ── Scrollback ──────────────────────────────────
scrollback_lines 10000

# ── Bell ────────────────────────────────────────
enable_audio_bell no

# ── Tab Bar ─────────────────────────────────────
tab_bar_style    powerline
tab_powerline_style slanted

# ── URL Handling ────────────────────────────────
url_style curly
detect_urls yes

# ── Color Scheme: material-you ─────────────────

# Special
foreground           #e5e6f4
background           #10131c
selection_foreground  #10131c
selection_background  #acb7d9
cursor               #acb7d9
cursor_text_color    #10131c
url_color            #b2c5ff

# Black
color0  #20232c
color8  #2a2d37

# Red
color1  #ffb4ab
color9  #ffb4ab

# Green
color2  #b0b5df
color10 #b0b5df

# Yellow
color3  #acb7d9
color11 #acb7d9

# Blue
color4  #b2c5ff
color12 #b2c5ff

# Magenta
color5  #bab8e5
color13 #bab8e5

# Cyan
color6  #d0bef6
color14 #d0bef6

# White
color7  #c4c6d3
color15 #9396a2

# Tab bar colors
active_tab_foreground   #080b14
active_tab_background   #a59ede
inactive_tab_foreground #e5e6f4
inactive_tab_background #10131c
tab_bar_background      #080b14
