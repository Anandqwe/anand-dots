[Settings]
language = en
folder = ~/Pictures/Wallpapers
wallpaper = ~/Pictures/Wallpapers/stunning-landscape-spring-festival-japan.jpg
backend = swww
monitors = All
fill = fill
sort = name
color = #1e1e2e
subfolders = True
show_hidden = False
show_gifs_only = False
post_command = ~/.config/hypr/scripts/wallpaper-cache.sh "$wallpaper"
number_of_columns = 3
swww_transition_type = grow
swww_transition_step = 90
swww_transition_angle = 0
swww_transition_duration = 1
swww_transition_fps = 60
use_xdg_state = False
show_path_in_tooltip = True
all_subfolders = False
zen_mode = False
mpvpaper_sound = False
mpvpaper_options = 
stylesheet = /home/anand/.config/waypaper/style.css

